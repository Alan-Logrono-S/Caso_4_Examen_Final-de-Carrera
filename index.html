<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body id="body-login">
    <main class="main-login">
        <section id="section-login">
            <div id="card-login">
                <h1 id="login-title">LOGIN</h1>
                <form id="form-login">
                    <div class="label-login">
                        <label  class= "label-login" for="email">Email</label>
                        <input type="email" id="email" required placeholder="ejemplo@correo.comn">
                    </div>
                    <div class="label-login">
                        <label class= "label-login" for="password">Clave</label>
                        <input type="password" id="password" required placeholder="******">
                    </div>
                    <button id="btn-login">INGRESAR</button>
                </form>
                <div id="errorRespuesta" class="errorHiden"></div>
            </div>
        </section>
    </main>
</body>
<script type="module" src="login.js"></script>
</html>
